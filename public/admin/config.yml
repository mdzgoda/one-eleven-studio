backend:
  name: git-gateway
  branch: main

local_backend: true

media_folder: public/uploads
public_folder: /uploads

collections:
  - name: site
    label: Ustawienia strony
    files:
      - name: site
        label: Teksty strony
        file: content/site.json
        fields:
          - label: Branding
            name: branding
            widget: object
            fields:
              - { label: 'Logo (znak)', name: logoMark, widget: image, hint: 'Widoczne w nagłówku i stopce na każdej stronie' }
          - label: Strona główna
            name: home
            widget: object
            fields:
              - { label: 'Zdjęcie hero', name: heroImage, widget: image, hint: 'Duże zdjęcie po prawej stronie sekcji hero na stronie głównej' }
              - { label: Eyebrow, name: eyebrow, widget: string, hint: 'Mały, wielkimi literami napis nad głównym tytułem hero' }
              - { label: 'Tytuł hero (linia 1)', name: heroTitleLine1, widget: string }
              - { label: 'Tytuł hero (linia 2)', name: heroTitleLine2, widget: string }
              - { label: 'Tekst hero', name: heroText, widget: text }
              - { label: 'Etykieta przycisku głównego', name: primaryButtonLabel, widget: string }
              - { label: 'Etykieta przycisku drugorzędnego', name: secondaryButtonLabel, widget: string }
              - { label: 'Eyebrow — sale', name: roomsEyebrow, widget: string }
              - { label: 'Tytuł — sale', name: roomsTitle, widget: string }
              - { label: 'Eyebrow — sprzęt', name: gearEyebrow, widget: string }
              - { label: 'Eyebrow — wypożyczenia', name: rentEyebrow, widget: string }
              - { label: 'Tytuł — wypożyczenia', name: rentTitle, widget: text }
              - { label: 'Eyebrow — ekipa', name: crewEyebrow, widget: string }
              - { label: 'Tytuł — ekipa', name: crewTitle, widget: string }
              - { label: 'Eyebrow — opinie', name: testimonialsEyebrow, widget: string }
              - { label: 'Tytuł CTA', name: ctaTitle, widget: string }
              - { label: 'Etykieta przycisku CTA', name: ctaButtonLabel, widget: string }
              - { label: 'Pokaż sekcję: Sale', name: showRooms, widget: boolean, default: true, hint: 'Wyłącz, aby ukryć całą sekcję "Sale" na stronie głównej' }
              - { label: 'Pokaż sekcję: Wypożyczenia', name: showRentals, widget: boolean, default: true, hint: 'Wyłącz, aby ukryć całą sekcję "Wypożycz Rzadkości"' }
              - { label: 'Pokaż sekcję: Prace', name: showWork, widget: boolean, default: true, hint: 'Wyłącz, aby ukryć statystyki i siatkę portfolio' }
              - { label: 'Pokaż sekcję: Opinie', name: showTestimonials, widget: boolean, default: true, hint: 'Wyłącz, aby ukryć sekcję "W Ich Słowach"' }
          - label: Strona sprzętu
            name: gearPage
            widget: object
            fields:
              - { label: 'Pokaż stronę /gear', name: visible, widget: boolean, default: true, hint: 'Wyłącz, aby ukryć link w menu, sekcję na stronie głównej i całą stronę /gear (bezpośrednie wejście przekieruje na stronę główną)' }
              - { label: Eyebrow, name: eyebrow, widget: string, hint: 'Mały napis nad tytułem na górze strony /gear' }
              - { label: Tytuł, name: title, widget: string }
              - { label: Podtytuł, name: subtitle, widget: text }
          - label: Strona ekipy
            name: crewPage
            widget: object
            fields:
              - { label: 'Pokaż stronę /crew', name: visible, widget: boolean, default: true, hint: 'Wyłącz, aby ukryć link w menu, sekcję na stronie głównej i całą stronę /crew (bezpośrednie wejście przekieruje na stronę główną)' }
              - { label: Eyebrow, name: eyebrow, widget: string, hint: 'Mały napis nad tytułem na górze strony /crew' }
              - { label: Tytuł, name: title, widget: string }
          - label: Strona rezerwacji
            name: bookingPage
            widget: object
            fields:
              - { label: 'Pokaż stronę /book', name: visible, widget: boolean, default: true, hint: 'Wyłącz, aby ukryć link w menu, przyciski rezerwacji i całą stronę /book (bezpośrednie wejście przekieruje na stronę główną)' }
              - { label: Eyebrow, name: eyebrow, widget: string, hint: 'Mały napis nad tytułem na górze strony /book' }
              - { label: Tytuł, name: title, widget: string }
              - { label: Podtytuł, name: subtitle, widget: text }
              - { label: 'Tekst podziękowania', name: thankYou, widget: text, hint: 'Pokazywany zamiast formularza po jego wysłaniu' }
          - label: Stopka
            name: footer
            widget: object
            fields:
              - { label: 'Hasło (tagline)', name: tagline, widget: text }
              - { label: 'Nagłówek — odwiedź', name: visitHeading, widget: string }
              - { label: 'Adres (linia 1)', name: addressLine1, widget: string }
              - { label: 'Adres (linia 2)', name: addressLine2, widget: string }
              - { label: Godziny, name: hours, widget: string }
              - { label: 'Nagłówek — rezerwacja', name: bookingHeading, widget: string }
              - { label: E-mail, name: email, widget: string }
              - { label: Telefon, name: phone, widget: string }
              - { label: 'Nagłówek — obserwuj', name: followHeading, widget: string }
              - label: 'Linki społecznościowe'
                name: socialLinks
                widget: list
                fields:
                  - { label: Nazwa, name: label, widget: string }
                  - { label: URL, name: url, widget: string }
              - { label: Copyright, name: copyright, widget: string }
              - { label: 'Notatka o dostępności', name: availabilityNote, widget: string }

  - name: rooms
    label: Sale
    folder: content/rooms
    create: true
    slug: '{{fields.name}}'
    extension: json
    format: json
    fields:
      - { label: Widoczny, name: visible, widget: boolean, default: true, hint: 'Wyłącz, aby ukryć tę salę na stronie bez usuwania jej treści' }
      - { label: 'Etykieta (np. SALA A)', name: label, widget: string }
      - { label: Nazwa, name: name, widget: string }
      - { label: Opis, name: description, widget: text }
      - { label: Specyfikacja, name: specs, widget: string }

  - name: gear
    label: Sprzęt
    folder: content/gear
    create: true
    slug: '{{fields.title}}'
    extension: json
    format: json
    fields:
      - { label: Widoczna, name: visible, widget: boolean, default: true, hint: 'Wyłącz, aby ukryć tę grupę sprzętu bez usuwania jej treści' }
      - { label: 'Nazwa grupy', name: title, widget: string }
      - label: Pozycje
        name: items
        widget: list
        field: { label: Pozycja, name: item, widget: string }

  - name: rentals
    label: Wypożyczenia
    folder: content/rentals
    create: true
    slug: '{{fields.name}}'
    extension: json
    format: json
    fields:
      - { label: Widoczne, name: visible, widget: boolean, default: true, hint: 'Wyłącz, aby ukryć tę pozycję wypożyczenia bez usuwania jej treści' }
      - { label: Nazwa, name: name, widget: string }
      - { label: Opis, name: description, widget: text }

  - name: crew
    label: Ekipa
    folder: content/crew
    create: true
    slug: '{{fields.name}}'
    extension: json
    format: json
    fields:
      - { label: Widoczny, name: visible, widget: boolean, default: true, hint: 'Wyłącz, aby ukryć tę osobę bez usuwania jej danych' }
      - { label: Zdjęcie, name: photoSrc, widget: image, required: false, hint: 'Opcjonalne — kwadratowe zdjęcie, wyświetlane czarno-białe. Bez zdjęcia pokazuje się puste pole z narożnikami.' }
      - { label: 'Imię i nazwisko', name: name, widget: string }
      - { label: Rola, name: role, widget: string }
      - { label: Bio, name: bio, widget: text }

  - name: stats
    label: Statystyki
    folder: content/stats
    create: true
    slug: '{{fields.label}}'
    extension: json
    format: json
    fields:
      - { label: Widoczna, name: visible, widget: boolean, default: true, hint: 'Wyłącz, aby ukryć tę statystykę bez usuwania jej' }
      - { label: Wartość, name: value, widget: string }
      - { label: Etykieta, name: label, widget: string }

  - name: portfolio
    label: Portfolio
    folder: content/portfolio
    create: true
    slug: '{{year}}{{month}}{{day}}{{hour}}{{minute}}{{second}}'
    extension: json
    format: json
    fields:
      - { label: Widoczny, name: visible, widget: boolean, default: true, hint: 'Wyłącz, aby ukryć ten kafelek bez usuwania jego treści' }
      - { label: Zdjęcie, name: photo, widget: image, required: false, hint: 'Opcjonalne — jeśli dodane, zastępuje kolorowy kafelek czarno-białym zdjęciem' }
      - { label: 'Kolor tła', name: bg, widget: color, hint: 'Używany jako kafelek, gdy nie dodano zdjęcia' }
      - { label: Podpis, name: caption, widget: string }
      - { label: 'Plik audio', name: audioSrc, widget: file, required: false, hint: 'Opcjonalne — mp3/wav odtwarzane po kliknięciu kafelka. Bez pliku odtwarzanie jest symulowane (pasek postępu bez dźwięku).' }

  - name: testimonials
    label: Opinie
    folder: content/testimonials
    create: true
    slug: '{{year}}{{month}}{{day}}{{hour}}{{minute}}{{second}}'
    extension: json
    format: json
    fields:
      - { label: Widoczna, name: visible, widget: boolean, default: true, hint: 'Wyłącz, aby ukryć tę opinię bez usuwania jej treści' }
      - { label: Cytat, name: quote, widget: text }
      - { label: Autor, name: attribution, widget: string }
